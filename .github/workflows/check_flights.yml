name: Check Flights

on:
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  check:
    runs-on: ubuntu-22.04
    permissions:
      contents: write  # Needed to commit updated state.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run flight checker
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "flight-checker[bot]"
          git config user.email "flight-checker@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update seen flights state"
          git push
